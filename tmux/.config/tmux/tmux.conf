# ─────────────────────────────────────────────
# General
# ─────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g escape-time 0
set -g repeat-time 600
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g display-time 2000
set -g display-panes-time 2000

# ─────────────────────────────────────────────
# Amp CLI compatibility
# ─────────────────────────────────────────────

set -g allow-passthrough all
set -ga terminal-features ",*:hyperlinks"
set -s extended-keys on

# ─────────────────────────────────────────────
# Prefix
# ─────────────────────────────────────────────

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─────────────────────────────────────────────
# Keybindings
# ─────────────────────────────────────────────

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits — open in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r [ previous-window
bind -r ] next-window

# Swap windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ─────────────────────────────────────────────
# Copy mode (vi)
# ─────────────────────────────────────────────

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ─────────────────────────────────────────────
# Status bar
# ─────────────────────────────────────────────

set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"

set -g status-left-length 40
set -g status-left "#{?client_prefix,#[fg=cyan]#[bold] PREFIX #[fg=brightblack]│ ,#[fg=blue]#[bold] #S #[fg=brightblack]│ }#{?window_zoomed_flag,#[fg=yellow]#[bold] 󰊓 #[fg=brightblack]│ ,}"

set -g status-right-length 60
set -g status-right "#[fg=brightblack]│ #[fg=white]%H:%M"

# Window status
setw -g window-status-format "#[fg=brightblack] #I:#W "
setw -g window-status-current-format "#[fg=cyan,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"

# Messages
set -g message-style "fg=cyan,bg=default,bold"

# ─────────────────────────────────────────────
# Plugins (via TPM)
# ─────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Plugin install path
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# Install TPM if not present
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm'"

run '~/.config/tmux/plugins/tpm/tpm'
